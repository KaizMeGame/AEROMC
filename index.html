<!DOCTYPE html>
<html>
<head>
  <title>AEROMC</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>⚡ AEROMC ⚡</h1>

<h2>Login</h2>

<h2>Create Post</h2>
<input id="title" placeholder="Title">
<input id="content" placeholder="Content">
<button onclick="createPost()">Post</button>

<h2>Posts</h2>
<div id="posts"></div>

<script src="app.js"></script>
</body>
</html>
